{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-bold mb-4">Mi perfil</h2>
  <p class="mb-4">Usuario: <strong>{{ user.username }}</strong></p>
  <form method="post" action="/perfil" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Nombre</label>
      <input type="text" name="nombre" value="{{ user.nombre }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input type="email" name="email" value="{{ user.email }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Nueva contraseña</label>
      <input type="password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" />
    </div>
    <div>
      <button type="submit" class="bg-cyan-500 text-white px-4 py-2 rounded">Actualizar contraseña</button>
      <a href="/dashboard" class="ml-2 text-sm text-gray-600">Volver al panel</a>
    </div>
  </form>
</div>
{% endblock %}
