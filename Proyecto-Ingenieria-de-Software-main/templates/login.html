<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión D.A.R.T</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-2xl">
  <div class="mb-6">
    <p class="inline-flex rounded-full bg-cyan-100 px-4 py-1 text-sm font-semibold text-cyan-700 uppercase tracking-wide">D.A.R.T</p>
    <h1 class="mt-4 text-3xl font-bold text-slate-900">Iniciar sesión</h1>
    <p class="mt-3 text-sm leading-6 text-slate-600">Ingresa para continuar con la gestión de ART/AST, riesgos y evidencias.</p>
  </div>
  {% if error %}
  <div class="mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
  {% endif %}
  <form action="/login" method="post" class="space-y-4">
    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700">Usuario</label>
      <input type="text" name="username" placeholder="Usuario" class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none focus:border-cyan-500">
    </div>
    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700">Contraseña</label>
      <input type="password" name="password" placeholder="Contraseña" class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none focus:border-cyan-500">
    </div>
    <button type="submit" class="w-full rounded-2xl bg-cyan-500 px-4 py-3 font-semibold text-slate-950 transition hover:bg-cyan-400">Ingresar</button>
  </form>
  <p class="mt-4 text-sm text-slate-600">¿No tienes cuenta? <a href="/registro" class="font-semibold text-cyan-700 hover:text-cyan-600">Regístrate</a></p>
</div>
</body>
</html>
